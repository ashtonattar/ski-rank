<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0.6" y2="1">
      <stop offset="0%"   stop-color="#041428"/>
      <stop offset="100%" stop-color="#020C1C"/>
    </linearGradient>
    <linearGradient id="mtnMain" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%"   stop-color="#00D4FF"/>
      <stop offset="60%"  stop-color="#0099CC"/>
      <stop offset="100%" stop-color="#006699"/>
    </linearGradient>
    <linearGradient id="mtnShadow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#003355" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#001828" stop-opacity="0.75"/>
    </linearGradient>
    <linearGradient id="snowCap" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%"   stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#DDEEFF"/>
    </linearGradient>
    <radialGradient id="peakGlow" cx="50%" cy="38%" r="42%">
      <stop offset="0%"   stop-color="#00D4FF" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="#00D4FF" stop-opacity="0"/>
    </radialGradient>
    <filter id="mtnGlow">
      <feGaussianBlur stdDeviation="9" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="starGlow">
      <feGaussianBlur stdDeviation="5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background rounded square -->
  <rect width="1024" height="1024" rx="220" ry="220" fill="url(#bg)"/>

  <!-- Ambient glow -->
  <ellipse cx="512" cy="400" rx="300" ry="240" fill="url(#peakGlow)"/>

  <!-- Back mountains -->
  <polygon points="150,700 330,420 510,700" fill="#0A2840" opacity="0.85"/>
  <polygon points="500,700 680,440 860,700" fill="#0A2840" opacity="0.65"/>

  <!-- Main mountain -->
  <polygon points="512,175 110,715 914,715" fill="url(#mtnMain)" filter="url(#mtnGlow)"/>
  <!-- Shadow face -->
  <polygon points="512,175 914,715 512,715" fill="url(#mtnShadow)"/>

  <!-- Snow cap -->
  <polygon points="512,175 415,355 609,355" fill="url(#snowCap)"/>
  <polygon points="512,175 512,355 609,355" fill="rgba(150,210,240,0.45)"/>

  <!-- Peak dot -->
  <circle cx="512" cy="177" r="9" fill="#FFFFFF" opacity="0.95"/>

  <!-- Skier on slope -->
  <g transform="translate(650,510) rotate(-18)" fill="#FFFFFF" opacity="0.95">
    <circle cx="0" cy="-28" r="12"/>
    <rect x="-7" y="-17" width="14" height="26" rx="6"/>
    <line x1="-7" y1="-8" x2="-30" y2="2" stroke="#FFFFFF" stroke-width="7" stroke-linecap="round"/>
    <line x1="-30" y1="2" x2="-34" y2="24" stroke="#FFFFFF" stroke-width="4" stroke-linecap="round" opacity="0.6"/>
    <line x1="2" y1="9" x2="11" y2="32" stroke="#FFFFFF" stroke-width="8" stroke-linecap="round"/>
    <line x1="-4" y1="9" x2="1" y2="32" stroke="#FFFFFF" stroke-width="8" stroke-linecap="round"/>
    <line x1="-9" y1="32" x2="27" y2="38" stroke="#00EEFF" stroke-width="5" stroke-linecap="round"/>
    <line x1="-15" y1="32" x2="15" y2="38" stroke="#00EEFF" stroke-width="5" stroke-linecap="round" opacity="0.55"/>
  </g>

  <!-- Star badge — top right, smaller -->
  <g transform="translate(800,178)" filter="url(#starGlow)">
    <circle cx="0" cy="0" r="56" fill="#CC8800" opacity="0.25"/>
    <circle cx="0" cy="0" r="48" fill="none" stroke="#FFD700" stroke-width="2" opacity="0.55"/>
    <polygon points="0,-34 8,-11 32,-11 14,4 21,27 0,13 -21,27 -14,4 -32,-11 -8,-11"
             fill="#FFD700"/>
  </g>

  <!-- Divider line -->
  <rect x="60" y="735" width="904" height="2" rx="1" fill="rgba(0,212,255,0.18)"/>

  <!-- "SKI" wordmark -->
  <text x="512" y="852"
    font-family="'Arial Black','Impact','Helvetica Neue',sans-serif"
    font-size="148" font-weight="900" letter-spacing="28"
    text-anchor="middle"
    fill="#00D4FF">SKI</text>

  <!-- Underline accent -->
  <rect x="280" y="868" width="464" height="4" rx="2" fill="#00D4FF" opacity="0.45"/>

  <!-- "RANK" label -->
  <text x="512" y="944"
    font-family="'Arial','Helvetica Neue',sans-serif"
    font-size="54" font-weight="700" letter-spacing="22"
    text-anchor="middle"
    fill="rgba(255,255,255,0.45)">RANK</text>

  <!-- Inner border glow -->
  <rect x="3" y="3" width="1018" height="1018" rx="218" ry="218"
    fill="none" stroke="rgba(0,212,255,0.14)" stroke-width="3"/>
</svg>
